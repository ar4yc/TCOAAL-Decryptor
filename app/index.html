<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="viewport" content="user-scalable=no" />
    <link rel="icon" id="favicon" type="image/png" />
    <link rel="apple-touch-icon" id="apple-icon" />
    <title>The Coffin of Andy and Leyley</title>
    <style>
      body {
        background-color: black;
        margin: 0;
        overflow: hidden;
      }
      /* Splash shown while bootstrapping (SW registration + IDB check) */
      #boot-splash {
        position: fixed;
        inset: 0;
        background: #000;
        color: #aaa;
        font-family: "Georgia", serif;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        letter-spacing: 0.06em;
        z-index: 9999;
        transition: opacity 0.3s;
      }
      #boot-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Error overlay shown when boot fails or a runtime error occurs */
      #boot-error {
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        color: #d3d0c0;
        font-family: "Georgia", serif;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        z-index: 10000;
        overflow: auto;
      }
      #boot-error.visible {
        display: flex;
      }
      #boot-error h1 {
        color: #ec83c3;
        font-size: 22px;
        font-weight: normal;
        letter-spacing: 0.05em;
        margin: 0 0 12px;
        text-align: center;
      }
      #boot-error p {
        color: rgba(255, 255, 255, 0.75);
        max-width: 540px;
        line-height: 1.55;
        margin: 0 0 16px;
        font-size: 15px;
        text-align: center;
      }
      #boot-error .err-msg {
        max-width: 540px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 12px 14px;
        color: #ff9aa2;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0 0 18px;
        max-height: 30vh;
        overflow: auto;
      }
      #boot-error .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }
      #boot-error button {
        background: #555;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 10px 18px;
        font-size: 15px;
        font-family: "Georgia", serif;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.15s;
      }
      #boot-error button:hover {
        background: #666;
      }
      #boot-error button.danger {
        background: #955456;
      }
      #boot-error button.danger:hover {
        background: #a8616a;
      }
      #boot-error .details-btn {
        background: transparent;
        color: #888;
        font-size: 12px;
        text-decoration: underline;
        padding: 6px 10px;
        margin-top: 14px;
      }
      #boot-error .details-btn:hover {
        background: transparent;
        color: #aaa;
      }
      #boot-error .diag {
        display: none;
        max-width: 540px;
        margin-top: 12px;
        font-size: 11px;
        color: #888;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        background: #0f0f0f;
        border: 1px solid #222;
        border-radius: 4px;
        padding: 10px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      #boot-error .diag.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">Loading...</div>

    <div id="boot-error">
      <h1 id="err-title">Something went wrong</h1>
      <p id="err-desc">
        The game couldn't start. This is often caused by an incomplete import or
        a stale browser cache. Clearing the loaded data and re-importing usually
        fixes it.
      </p>
      <div class="err-msg" id="err-msg"></div>
      <div class="actions">
        <button class="danger" onclick="window.__bootClearAndReload()">
          Clear data &amp; re-import
        </button>
        <button onclick="location.reload()">Reload</button>
      </div>
      <button class="details-btn" onclick="window.__bootToggleDiag()">
        Show diagnostic info
      </button>
      <div class="diag" id="err-diag"></div>
    </div>

    <script>
      /**
       * Bootstrap: register SW, check for game files, load game scripts.
       *
       * On GitHub Pages the game files live in IndexedDB (imported via loader.html).
       * The Service Worker intercepts script requests and serves them from IDB.
       * We must ensure the SW is active BEFORE loading game scripts, otherwise
       * the <script> requests would 404 against the static host.
       */
      (function () {
        "use strict";

        // Site-wide lock check. /lock.json drives a maintenance / outage
        // screen at /lock.html; if enabled we redirect there before doing
        // anything else. Synchronous XHR is used so the splash never has
        // a chance to render the game UI. cache:no-store equivalent is
        // achieved with the cachebuster query: sync XHR doesn't honour
        // fetch options. Partial locks are short-circuited locally via
        // a localStorage mirror written by lock.html on dismiss, so a
        // user who already acknowledged isn't bounced through lock.html
        // on every load.
        try {
          var _lx = new XMLHttpRequest();
          _lx.open("GET", "/lock.json?_=" + Date.now(), false);
          _lx.send();
          if (_lx.status >= 200 && _lx.status < 300) {
            var _lock = JSON.parse(_lx.responseText);
            if (_lock && _lock.enabled) {
              var _id = _lock.id || "default";
              var _seen = null;
              if (_lock.type === "partial") {
                try {
                  _seen = localStorage.getItem("__lock_dismissed__:" + _id);
                } catch (_) {}
              }
              if (!_seen) {
                location.replace(
                  "/lock.html?return=" +
                    encodeURIComponent(location.pathname + location.search),
                );
                return;
              }
            }
          }
        } catch (_) {}

        // One-time translation-prefix save migration lives on its own page.
        // If any localStorage save key still carries a "translation_*:" prefix
        // we hand off to /migrate.html before doing anything else: that page
        // owns the backup-zip modal and the merge, and isn't fighting the
        // game's PIXI canvas / boot-splash / LOADING image for the screen.
        // location.replace keeps it out of session history.
        //
        // After a successful migration migrate.html sets the flag
        // `_migration_translation_done`. With that flag present we never
        // redirect again: any straggler translation_<id>:* key is silently
        // dropped (it can only be an orphan that slipped past the merge's
        // sweep: it would otherwise re-trigger this redirect on every
        // boot, which is exactly the regression the flag is here to stop).
        try {
          var _migrationDone = false;
          try {
            _migrationDone = !!localStorage.getItem(
              "_migration_translation_done",
            );
          } catch (_) {}
          var _stragglers = [];
          var _needsMigrate = false;
          for (var _mi = 0; _mi < localStorage.length; _mi++) {
            var _mk = localStorage.key(_mi);
            if (typeof _mk !== "string") continue;
            if (!/^translation_[^:]+:/.test(_mk)) continue;
            _stragglers.push(_mk);
            if (
              !_migrationDone &&
              /^translation_[^:]+:RPG (?:File\d+(?:bak)?|Global|Config)$/.test(
                _mk,
              )
            ) {
              _needsMigrate = true;
            }
          }
          if (_needsMigrate) {
            location.replace("/migrate.html");
            return;
          }
          if (_migrationDone && _stragglers.length > 0) {
            for (var _si = 0; _si < _stragglers.length; _si++) {
              try {
                localStorage.removeItem(_stragglers[_si]);
              } catch (_) {}
            }
            // Mirror the LS purge into tcoaal-saves so a future
            // restoreSavesFromIDB pass can't bring the stragglers back.
            // Best-effort and async: failures are silently ignored, since
            // the LS purge above already addresses the user-visible symptom
            // (the loader export reads LS only).
            try {
              var _sReq = indexedDB.open("tcoaal-saves", 1);
              _sReq.onupgradeneeded = function (e) {
                try {
                  e.target.result.createObjectStore("saves");
                } catch (_) {}
              };
              _sReq.onsuccess = function (e) {
                var _db = e.target.result;
                try {
                  var _rtx = _db.transaction("saves", "readonly");
                  var _kr = _rtx.objectStore("saves").getAllKeys();
                  _kr.onsuccess = function () {
                    var _keys = _kr.result || [];
                    var _doom = [];
                    for (var _ki = 0; _ki < _keys.length; _ki++) {
                      var _ik = _keys[_ki];
                      if (
                        typeof _ik === "string" &&
                        /^translation_[^:]+:/.test(_ik)
                      ) {
                        _doom.push(_ik);
                      }
                    }
                    if (_doom.length === 0) return;
                    try {
                      var _wtx = _db.transaction("saves", "readwrite");
                      var _st = _wtx.objectStore("saves");
                      for (var _di = 0; _di < _doom.length; _di++) {
                        try {
                          _st.delete(_doom[_di]);
                        } catch (_) {}
                      }
                    } catch (_) {}
                  };
                } catch (_) {}
              };
            } catch (_) {}
          }
        } catch (_) {}

        var DB_NAME = "tcoaal";
        var DB_VERSION = 1;
        var STORE_NAME = "assets";
        var SAVE_DB_NAME = "tcoaal-saves";
        var TRANSLATIONS_DB_NAME = "tcoaal-translations";
        var CLD_KEY = "data/9c7050ae76645487";
        var LANG_CACHE_KEY = "__lang_data__";

        var splash = document.getElementById("boot-splash");
        var errOverlay = document.getElementById("boot-error");
        var errTitle = document.getElementById("err-title");
        var errDesc = document.getElementById("err-desc");
        var errMsg = document.getElementById("err-msg");
        var errDiag = document.getElementById("err-diag");

        var bootPhase = "init";
        var bootDone = false;

        function setSplash(msg) {
          splash.textContent = msg;
        }

        function setPhase(name, label) {
          bootPhase = name;
          setSplash(label);
        }

        function buildDiagnostics(err) {
          var lines = [];
          lines.push("Phase: " + bootPhase);
          lines.push("UA: " + (navigator.userAgent || "?"));
          lines.push("URL: " + location.href);
          lines.push(
            "SW: " +
              ("serviceWorker" in navigator
                ? navigator.serviceWorker.controller
                  ? "controlled"
                  : "registered/uncontrolled"
                : "unsupported"),
          );
          if (err) {
            if (err.message) lines.push("Error: " + err.message);
            else lines.push("Error: " + String(err));
            if (err.stack) lines.push("Stack: " + err.stack);
          }
          return lines.join("\n");
        }

        function showError(title, desc, err) {
          if (bootDone) return; // ignore post-boot errors (game owns them)
          if (errOverlay.classList.contains("visible")) return; // first error wins
          if (title) errTitle.textContent = title;
          if (desc) errDesc.textContent = desc;
          var msg = err
            ? err.message || String(err)
            : "Boot failed during phase: " + bootPhase;
          errMsg.textContent = msg;
          errDiag.textContent = buildDiagnostics(err);
          errOverlay.classList.add("visible");
          // Hide splash so error is the only thing visible.
          splash.classList.add("hidden");
        }

        // Clear all persisted state and send the user back to the loader.
        //
        // Order matters: the Service Worker keeps its own open connection
        // to the `tcoaal` database. If we call deleteDatabase while the SW
        // still holds it, the request stalls in `onblocked` and silently
        // resolves but the DB isn't actually gone, so loader.html reads
        // back stale (or partially-deleted) keys and bounces straight back
        // to the same error. We therefore:
        //   1) unregister the SW (releases its IDB handle)
        //   2) clear caches
        //   3) clear localStorage
        //   4) wait for deleteDatabase to truly complete (success only;
        //      onblocked means something is still holding it open)
        //   5) replace into loader.html
        window.__bootClearAndReload = async function () {
          var btn = errOverlay.querySelector("button.danger");
          if (btn) {
            btn.disabled = true;
            btn.textContent = "Clearing...";
          }

          // 1. Unregister all SWs first so they release their IDB handle.
          if ("serviceWorker" in navigator) {
            try {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(
                regs.map(function (r) {
                  return r.unregister();
                }),
              );
            } catch (e) {}
          }

          // 2. Caches.
          if ("caches" in self) {
            try {
              var keys = await caches.keys();
              await Promise.all(
                keys.map(function (k) {
                  return caches.delete(k);
                }),
              );
            } catch (e) {}
          }

          // 3. localStorage.
          try {
            localStorage.clear();
          } catch (e) {}

          // 4. Delete the IDB databases. Resolve on success; if the
          // request is blocked, wait a short while and retry once, the
          // SW takes a tick to fully detach. If still blocked after that,
          // proceed anyway (the loader will surface a clear error if the
          // DB is somehow still populated).
          function dropDb(name) {
            return new Promise(function (resolve) {
              function attempt(retries) {
                var settled = false;
                var req;
                try {
                  req = indexedDB.deleteDatabase(name);
                } catch (e) {
                  return resolve();
                }
                req.onsuccess = function () {
                  settled = true;
                  resolve();
                };
                req.onerror = function () {
                  settled = true;
                  resolve();
                };
                req.onblocked = function () {
                  if (settled) return;
                  if (retries > 0) {
                    settled = true;
                    setTimeout(function () {
                      attempt(retries - 1);
                    }, 250);
                  } else {
                    settled = true;
                    resolve();
                  }
                };
              }
              attempt(2);
            });
          }
          await dropDb(DB_NAME);
          await dropDb(SAVE_DB_NAME);
          await dropDb(TRANSLATIONS_DB_NAME);

          // 5. Redirect.
          location.replace("/loader.html");
        };

        window.__bootToggleDiag = function () {
          errDiag.classList.toggle("visible");
        };

        // Catch uncaught errors during boot. Once the game is running we
        // get out of the way (game owns its own crash UI from then on).
        window.addEventListener("error", function (e) {
          if (bootDone) return;
          showError(
            "Game failed to start",
            "An unexpected error happened while loading the game. " +
              "Clearing the imported data and re-importing usually fixes it.",
            e.error || { message: e.message },
          );
        });
        window.addEventListener("unhandledrejection", function (e) {
          if (bootDone) return;
          showError(
            "Game failed to start",
            "An unexpected error happened while loading the game. " +
              "Clearing the imported data and re-importing usually fixes it.",
            e.reason,
          );
        });

        // Step 1: register & activate the Service Worker
        function ensureSW() {
          if (!("serviceWorker" in navigator)) {
            return Promise.resolve();
          }
          return navigator.serviceWorker
            .register("/sw.js", { scope: "/" })
            .then(function (reg) {
              reg.update();
              if (navigator.serviceWorker.controller) {
                return Promise.resolve();
              }
              // Wait for the SW to take control (skipWaiting + claim)
              return new Promise(function (resolve) {
                navigator.serviceWorker.addEventListener(
                  "controllerchange",
                  resolve,
                  { once: true },
                );
                // Timeout: if SW doesn't claim in 3s, proceed anyway
                setTimeout(resolve, 3000);
              });
            })
            .catch(function (e) {
              console.warn("[boot] SW registration failed:", e);
            });
        }

        // IDB helpers (raw promises, no shared connection)
        function idbOpen() {
          return new Promise(function (resolve, reject) {
            try {
              var req = indexedDB.open(DB_NAME, DB_VERSION);
              req.onupgradeneeded = function (e) {
                e.target.result.createObjectStore(STORE_NAME);
              };
              req.onsuccess = function (e) {
                resolve(e.target.result);
              };
              req.onerror = function (e) {
                reject(e.target.error || new Error("IndexedDB open failed"));
              };
            } catch (ex) {
              reject(ex);
            }
          });
        }

        function idbGet(db, key) {
          return new Promise(function (resolve) {
            try {
              var tx = db.transaction(STORE_NAME, "readonly");
              var req = tx.objectStore(STORE_NAME).get(key);
              req.onsuccess = function () {
                resolve(req.result == null ? null : req.result);
              };
              req.onerror = function () {
                resolve(null);
              };
            } catch (e) {
              resolve(null);
            }
          });
        }

        function idbPut(db, key, value) {
          return new Promise(function (resolve) {
            try {
              var tx = db.transaction(STORE_NAME, "readwrite");
              var req = tx.objectStore(STORE_NAME).put(value, key);
              req.onsuccess = resolve;
              req.onerror = resolve;
            } catch (e) {
              resolve();
            }
          });
        }

        // Step 2: check whether game files are available (IDB or server.js).
        // We require BOTH a script file (rpg_core.js) and a way to get the
        // language data: either pre-extracted JSON in __lang_data__ or the
        // encrypted CLD file. Missing pieces produce a clear error instead
        // of letting the DRM crash with an obfuscated trace.
        function checkGameFiles(db) {
          return Promise.all([
            idbGet(db, "js/rpg_core.js"),
            idbGet(db, LANG_CACHE_KEY),
            idbGet(db, CLD_KEY),
          ]).then(function (results) {
            var hasCore = !!results[0];
            var hasLangCache = !!results[1];
            var hasEncryptedCld = !!results[2];
            return {
              hasCore: hasCore,
              hasLangCache: hasLangCache,
              hasEncryptedCld: hasEncryptedCld,
              hasAnyLang: hasLangCache || hasEncryptedCld,
            };
          });
        }

        // Healthcheck against the canonical manifest. If anything is
        // missing, kick the user over to /loader.html so they land on the
        // manage UI (with the missing-files warning + Play button).
        // Bugged installs no longer need to know the loader URL to
        // recover; clean installs go straight into the game.
        // Resolves true when complete (or when the manifest can't be
        // loaded: we don't gate boot on a missing manifest).
        function healthcheckOk(db) {
          return fetch("/expected-files.json", { cache: "no-cache" })
            .then(function (r) {
              return r.ok ? r.json() : null;
            })
            .catch(function () {
              return null;
            })
            .then(function (manifest) {
              if (!manifest || !Array.isArray(manifest.files)) return true;
              return new Promise(function (resolve) {
                try {
                  var req = db
                    .transaction("assets", "readonly")
                    .objectStore("assets")
                    .getAllKeys();
                  req.onsuccess = function () {
                    var keys = req.result || [];
                    var present = new Set();
                    for (var i = 0; i < keys.length; i++) {
                      if (typeof keys[i] === "string") {
                        present.add(keys[i].toLowerCase());
                      }
                    }
                    for (var j = 0; j < manifest.files.length; j++) {
                      if (!present.has(manifest.files[j].toLowerCase())) {
                        resolve(false);
                        return;
                      }
                    }
                    resolve(true);
                  };
                  req.onerror = function () {
                    resolve(true);
                  };
                } catch (e) {
                  resolve(true);
                }
              });
            });
        }

        // Check whether server.js mode is serving the game (no IDB needed).
        function checkServer() {
          return fetch("js/rpg_core.js", { method: "HEAD" })
            .then(function (r) {
              return r.ok && r.headers.get("content-type") !== "text/html";
            })
            .catch(function () {
              return false;
            });
        }

        // CLD synchronous decryption: avoids any dependency on the SW being
        // ready by decrypting the bytes ourselves and stashing the JSON in
        // window.__langData. Mirrors the logic in loader.html / sw.js.
        var TCOAAL_SIG = [84, 67, 79, 65, 65, 76]; // "TCOAAL"

        function fileMaskFor(hashedRelPath) {
          var fname = hashedRelPath.split("/").pop().toUpperCase();
          var m = 0;
          for (var i = 0; i < fname.length; i++)
            m = (m << 1) ^ fname.charCodeAt(i);
          return m;
        }

        function decryptCld(arrayBuffer) {
          var bytes = new Uint8Array(arrayBuffer);
          if (bytes.length < TCOAAL_SIG.length + 1) return bytes;
          for (var i = 0; i < TCOAAL_SIG.length; i++) {
            if (bytes[i] !== TCOAAL_SIG[i]) return bytes;
          }
          var keyByte = bytes[TCOAAL_SIG.length];
          var payload = bytes.subarray(TCOAAL_SIG.length + 1);
          var mask = (fileMaskFor(CLD_KEY) + 1) & 0xff;
          if (keyByte === 0) keyByte = payload.length;
          var out = new Uint8Array(payload.length);
          for (var j = 0; j < payload.length; j++) {
            if (j < keyByte) {
              var b = payload[j];
              out[j] = b ^ mask;
              mask = ((mask << 1) ^ b) & 0xff;
            } else {
              out[j] = payload[j];
            }
          }
          return out;
        }

        function extractLangFromCld(rawCld) {
          var buf = rawCld;
          if (rawCld instanceof Blob) {
            // Blob -> ArrayBuffer is async, handle separately via promise
            return rawCld.arrayBuffer().then(function (ab) {
              return extractLangFromCld(ab);
            });
          }
          if (rawCld && rawCld.buffer instanceof ArrayBuffer) {
            buf = rawCld.buffer;
          }
          var decrypted = decryptCld(buf);
          if (!decrypted || decrypted.length < 9) return null;
          var sig = new TextDecoder().decode(decrypted.slice(0, 8));
          if (sig !== "LANGDATA") return null;
          var jsonStr = new TextDecoder().decode(decrypted.slice(8));
          try {
            JSON.parse(jsonStr);
            return jsonStr;
          } catch (e) {
            return null;
          }
        }

        // Preload language data into a global so browser-shim.js can serve it
        // synchronously to the DRM payload.
        //
        // When a mod is active the CLD served to the DRM must be the MERGE of
        // base + mod data: the mod's own CSV-parsed data is missing required
        // CLD fields. The SW implements that merge on /lang-data.json, so we
        // fetch through it instead of reading IDB directly.
        //
        // Without an active mod we prefer __lang_data__ in IDB (fastest), then
        // fall back to decrypting the encrypted CLD ourselves (no SW needed),
        // then finally /lang-data.json. The middle step is critical on mobile
        // where the SW can be slow to claim.
        function preloadLangData(db, files) {
          var activeMod = null;
          try {
            activeMod = localStorage.getItem("_activeMod") || null;
          } catch (e) {}

          function fromLangDataJson() {
            return fetch("/lang-data.json", { cache: "no-store" })
              .then(function (res) {
                return res.ok ? res.text() : null;
              })
              .then(function (text) {
                if (text && typeof text === "string") {
                  window.__langData = text;
                }
              })
              .catch(function () {});
          }

          if (activeMod) {
            // Mod active: SW merges base + mod lang data.
            return fromLangDataJson();
          }

          // 1. Pre-extracted JSON in IDB (fastest, no SW required).
          if (files && files.hasLangCache) {
            return idbGet(db, LANG_CACHE_KEY).then(function (data) {
              if (data && typeof data === "string") {
                window.__langData = data;
                return;
              }
              // unexpected type -> fall through
              return decryptInline();
            });
          }

          // 2. Decrypt the CLD inline (no SW required).
          function decryptInline() {
            if (!files || !files.hasEncryptedCld) return fromLangDataJson();
            return idbGet(db, CLD_KEY).then(function (raw) {
              if (!raw) return fromLangDataJson();
              var maybePromise = extractLangFromCld(raw);
              if (maybePromise && typeof maybePromise.then === "function") {
                return maybePromise.then(function (json) {
                  if (json) {
                    window.__langData = json;
                    // Cache for next boot.
                    return idbPut(db, LANG_CACHE_KEY, json);
                  }
                  return fromLangDataJson();
                });
              }
              if (maybePromise) {
                window.__langData = maybePromise;
                return idbPut(db, LANG_CACHE_KEY, maybePromise);
              }
              return fromLangDataJson();
            });
          }

          return decryptInline();
        }

        // Step 2c: load favicon from IDB (icon/icon.png from the user's game files)
        function loadFavicon(db) {
          idbGet(db, "icon/icon.png").then(function (data) {
            if (!data) return;
            try {
              var blob =
                data instanceof Blob
                  ? data
                  : new Blob([data], { type: "image/png" });
              var url = URL.createObjectURL(blob);
              var fav = document.getElementById("favicon");
              var apple = document.getElementById("apple-icon");
              if (fav) fav.href = url;
              if (apple) apple.href = url;
            } catch (e) {}
          });
        }

        // Step 3: dynamically load game scripts in order.
        // A failed load is reported (not silently swallowed): the engine
        // can't recover from a missing rpg_core.js or browser-shim.js.
        function loadScripts(urls, idx) {
          if (idx >= urls.length) return Promise.resolve();
          return new Promise(function (resolve, reject) {
            var s = document.createElement("script");
            s.type = "text/javascript";
            s.src = urls[idx];
            s.onload = function () {
              loadScripts(urls, idx + 1)
                .then(resolve)
                .catch(reject);
            };
            s.onerror = function () {
              reject(new Error("Failed to load script: " + urls[idx]));
            };
            document.body.appendChild(s);
          });
        }

        // Game script order mirrors the original static <script> tags
        var GAME_SCRIPTS = [
          "js/libs/pixi.js",
          "js/libs/pixi-tilemap.js",
          "js/libs/pixi-picture.js",
          "js/libs/fpsmeter.js",
          "js/libs/lz-string.js",
          "js/libs/iphone-inline-video.browser.js",
          "js/rpg_core.js",
          "js/libs/pako_inflate.min.js",
          "js/libs/browser-shim.js",
          "js/rpg_managers.js",
          "js/rpg_objects.js",
          "js/rpg_scenes.js",
          "js/rpg_sprites.js",
          "js/rpg_windows.js",
          "js/plugins.js",
          "js/libs/lang-shim.js",
          "js/libs/achievements-shim.js",
          "js/main.js",
        ];

        // Boot sequence
        setPhase("init", "Initializing...");

        ensureSW()
          .then(function () {
            setPhase("check-files", "Checking game files...");
            // Open IDB. If this throws we likely have a private/locked
            // storage situation: still try server.js mode.
            return idbOpen().then(
              function (db) {
                return { db: db };
              },
              function () {
                return { db: null };
              },
            );
          })
          .then(function (ctx) {
            var db = ctx.db;
            if (!db) {
              return checkServer().then(function (ok) {
                if (!ok) {
                  // No IDB and no server, send to loader.
                  location.replace("/loader.html");
                  return null;
                }
                return { db: null, files: null, server: true };
              });
            }
            return checkGameFiles(db).then(function (files) {
              if (!files.hasCore) {
                // Maybe server.js mode (no IDB import).
                return checkServer().then(function (ok) {
                  if (ok) return { db: db, files: null, server: true };
                  // Nothing to play: send back to import flow.
                  location.replace("/loader.html");
                  return null;
                });
              }
              if (!files.hasAnyLang) {
                // Critical files imported but the language file is missing.
                // The DRM cannot start without it. Surface a clear error
                // so the user can clear and re-import.
                showError(
                  "Required game data missing",
                  "The language data file (data/9c7050ae76645487) wasn't " +
                    "found in the imported game. The game can't start " +
                    "without it. Re-import your full game folder.",
                  new Error(
                    "Missing CLD: neither __lang_data__ nor " +
                      CLD_KEY +
                      " is present in IndexedDB.",
                  ),
                );
                return null;
              }
              // Manifest healthcheck: if files are missing, send the user
              // to /loader.html (manage UI shows the report + a Play
              // button so they can still launch if they want).
              // Skip when the user has already acknowledged the missing
              // files via the loader's Play button: otherwise we'd loop
              // them right back here on every navigation.
              var acknowledged = false;
              try {
                acknowledged =
                  localStorage.getItem("_healthcheckAcknowledged") === "1";
              } catch (e) {}
              if (acknowledged) return { db: db, files: files, server: false };
              return healthcheckOk(db).then(function (ok) {
                if (!ok) {
                  location.replace("/loader.html");
                  return null;
                }
                return { db: db, files: files, server: false };
              });
            });
          })
          .then(function (ctx) {
            if (!ctx) return; // already handled (redirect or error)

            // Game files are available and SW is active, load the game
            setPhase("preload", "Preparing language data...");

            // Preload language data and favicon (favicon is non-blocking).
            if (ctx.db) loadFavicon(ctx.db);

            return preloadLangData(ctx.db, ctx.files).then(function () {
              // If we still don't have language data and there's no active
              // mod, fail loudly: the DRM will produce cryptic errors
              // ("Cannot create property imageLUT on string ''", etc.) if
              // we let it run without it.
              var activeMod = null;
              try {
                activeMod = localStorage.getItem("_activeMod") || null;
              } catch (e) {}
              if (!activeMod && !window.__langData) {
                showError(
                  "Language data unavailable",
                  "The game's language data couldn't be decoded. This " +
                    "usually means the import was incomplete. Clearing " +
                    "and re-importing the game folder fixes it.",
                  new Error("__langData empty after preload"),
                );
                return null;
              }

              setPhase("load-scripts", "Starting game...");

              // Load the font CSS first (it may also be in IDB)
              var link = document.createElement("link");
              link.rel = "stylesheet";
              link.type = "text/css";
              link.href = "fonts/gamefont.css";
              document.head.appendChild(link);

              // Intercept the onload handler that main.js will set
              // window.onload already fired so a plain assignment would
              // never trigger. We capture it and call it ourselves once
              // all plugin scripts have loaded.
              var _bootOnload = null;
              Object.defineProperty(window, "onload", {
                set: function (fn) {
                  _bootOnload = fn;
                },
                get: function () {
                  return _bootOnload;
                },
                configurable: true,
              });

              return loadScripts(GAME_SCRIPTS, 0).then(function () {
                setPhase("plugins", "Loading game plugins...");
                // Hide the splash
                splash.classList.add("hidden");
                setTimeout(function () {
                  splash.remove();
                }, 400);

                // main.js called PluginManager.setup($plugins). The
                // hardened loader in lang-shim.js fetches every plugin
                // source in parallel and exposes window.__pluginsLoaded
                // as a Promise that resolves once every plugin has been
                // injected as an inline <script>. Wait on it so we don't
                // boot before plugins (incl. the DRM payload) execute.
                // Falls back to a resolved Promise when the hardened
                // loader is absent (no behavioural change in that case).
                return Promise.resolve(window.__pluginsLoaded).then(
                  function () {
                    bootAfterPlugins();
                  },
                );

                function bootAfterPlugins() {
                  // Finish boot: apply browser overrides then start game.
                  function finishBoot() {
                    setPhase("apply-overrides", "Applying overrides...");
                    // Apply browser overrides for non-zlib DRM types
                    // (deobfuscated.js, GameCode.js, etc.). For zlib DRM,
                    // the overrides were already applied via inflateSync
                    // but __applyBrowserOverrides is idempotent.
                    if (window.__applyBrowserOverrides)
                      window.__applyBrowserOverrides();

                    // Hook lang-shim into Scene_Boot AFTER DRM payload
                    // has loaded (it overwrites Scene_Boot.prototype.start)
                    if (window.__langShimHookBoot) window.__langShimHookBoot();
                    if (window.__achvShimHookBoot) window.__achvShimHookBoot();
                    delete window.onload;
                    bootDone = true;
                    if (_bootOnload) {
                      _bootOnload();
                    } else if (typeof SceneManager !== "undefined") {
                      SceneManager.run(Scene_Boot);
                    }
                  }

                  // Some mods load game code via async <script> tags
                  // (e.g. deobfuscated.js injected by _()), which may not
                  // have executed yet. Detect and wait for them before
                  // applying overrides and booting the game.
                  var pendingGameCode = null;
                  var scripts = document.getElementsByTagName("script");
                  for (var si = 0; si < scripts.length; si++) {
                    var src = scripts[si].getAttribute("src") || "";
                    if (
                      src.indexOf("deobfuscated") >= 0 ||
                      src.indexOf("GameCode") >= 0
                    ) {
                      // Check if game globals exist (script already ran)
                      if (
                        typeof Lang === "undefined" &&
                        typeof App === "undefined"
                      ) {
                        pendingGameCode = scripts[si];
                      }
                      break;
                    }
                  }

                  if (pendingGameCode) {
                    var _booted = false;
                    function onceDone() {
                      if (_booted) return;
                      _booted = true;
                      finishBoot();
                    }
                    pendingGameCode.addEventListener("load", onceDone);
                    pendingGameCode.addEventListener("error", onceDone);
                    // Safety timeout: don't block forever
                    setTimeout(onceDone, 5000);
                  } else {
                    finishBoot();
                  }
                }
              });
            }); // end preloadLangData().then
          })
          .catch(function (e) {
            console.error("[boot] Fatal:", e);
            showError(
              "Game failed to start",
              "The game couldn't start. Clearing the imported data and " +
                "re-importing the game folder usually fixes it.",
              e,
            );
          });
      })();
    </script>
  </body>
</html>
